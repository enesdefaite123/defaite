<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEFAİTE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="enter-screen" onclick="document.getElementById('audio-player').play(); this.style.opacity='0'; setTimeout(() => { this.style.display='none'; }, 500);" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #121212; z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: opacity 0.5s ease; color: white; font-family: sans-serif;">
        <h1 style="font-size: 4rem; letter-spacing: 10px; margin: 0; font-weight: normal;">DEFAİTE</h1>
        <span style="font-size: 1.2rem; opacity: 0.7; margin-top: 15px; letter-spacing: 3px;">Tıkla-Click</span>
    </div>
    <div id="snow-container"></div>

    <section class="section hero">
        <div class="circle-row">
            <div class="circle-wrapper">
                <div class="circle small ceyranci"></div>
                <span class="circle-name">Ceyrancı</span>
            </div>

            <div class="circle-wrapper">
                <div class="circle medium medusa"></div>
                <span class="circle-name">Medusa</span>
            </div>

            <div class="circle-wrapper">
                <div class="circle large enes"></div>
                <span class="circle-name">Enes</span>
            </div>

            <div class="circle-wrapper">
                <div class="circle medium rapizar"></div>
                <span class="circle-name">Rapizar</span>
            </div>

            <div class="circle-wrapper">
                <div class="circle small crextwo"></div>
                <span class="circle-name">Crextwo</span>
            </div>
        </div>

        <h1 class="logo-text">DEFAİTE</h1>
    </section>

    <section class="section discord">
        <h2 class="discord-title">DİSCORD</h2>
        <a href="https://discord.gg/6YJgJna7hM" target="_blank" class="discord-link">
            <svg viewBox="0 0 127.14 96.36" width="60" height="60" fill="currentColor">
                <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.31,60,73.31,53s5-12.74,11.43-12.74S96.16,46,96.06,53,91.08,65.69,84.69,65.69Z"/>
            </svg>
        </a>
    </section>

    <audio id="audio-player" autoplay></audio>
    <div class="spotify-player glass-panel">
        <div class="player-top">
            <div class="track-info">
                <p class="track-title" id="track-title">discipline - Slowed</p>
                <p class="track-artist" id="track-artist">HELLBLADE</p>
                <p class="track-album" id="track-album">discipline</p>
            </div>
        </div>
        <div class="player-middle">
            <span class="time" id="time-current">00:00</span>
            <input type="range" class="progress-bar" id="progress-bar" min="0" max="100" value="0">
            <span class="time" id="time-total">00:00</span>
        </div>
        <div class="player-bottom">
            <span class="icon" id="btn-shuffle" title="Karıştır">🔀</span>
            <span class="icon" id="btn-prev" title="Önceki">⏮</span>
            <span class="icon pause-btn" id="btn-play" title="Oynat/Durdur">▶</span>
            <span class="icon" id="btn-next" title="Sonraki">⏭</span>
            <span class="icon active-repeat" id="btn-repeat" title="Tekrar">🔁</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
